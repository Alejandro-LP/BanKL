<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - BanKL</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<header>
    <div>
        <div class="logo">
            <span>Ban</span><span>KL</span>
        </div>
        <small>Innovación financiera</small>
    </div>

    <div class="buttons">
        <a href="Login.html"><button>Login</button></a>
        <button onclick="toggleDark()" class="dark-btn">🌙</button>
    </div>
</header>

<main class="login-container">

    <div class="login-card">
        <h2>Registro</h2>

        <input type="text" id="nombres" placeholder="Nombres">
        <input type="text" id="apellidos" placeholder="Apellidos">
        <input type="text" id="id" placeholder="Documento">
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="email" id="email" placeholder="Correo">

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="contrasena" placeholder="Contraseña">

        <button onclick="registrar()">Crear Cuenta</button>

<p id="resultadoRegistro"></p>
        

        <p>
            ¿Ya tienes cuenta?
            <a href="Login.html" class="link">Inicia sesión</a>
        </p>
    </div>

</main>

<footer>
    <div><b>BanKL</b></div>
</footer>

<script src="../js/app.js"></script>
</body>
</html>
