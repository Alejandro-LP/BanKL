<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - BanKL</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<header>
    <div>
        <div class="logo">
            <span>Ban</span><span>KL</span>
        </div>
        <small>Innovación financiera para tu futuro</small>
    </div>

    <div class="buttons">
        <a href="index.html"><button>Inicio</button></a>
        <button onclick="toggleDark()" class="dark-btn">🌙</button>
    </div>
</header>

<main class="login-container">

    <div class="login-card">
        <h2>Iniciar Sesión</h2>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="contrasena" placeholder="Contraseña">
        <input type="text" id="pin" placeholder="PIN">
    <div class="buttons">
        <button onclick="login()">Ingresar</button>
    </div>
        <p id="resultado"></p>
       
        <p style="margin-top: 15px;">
            ¿No tienes cuenta?
            <a href="registro.html" class="link">Regístrate aquí</a>
        </p>
    </div>

</main>

<footer>
    <div>
        <b>Contáctanos</b><br>
        1234565465
    </div>

    <div class="center">
        <b>BanKL</b>
    </div>

    <div class="right">
        <b>SFC</b>
    </div>
</footer>

<script src="../js/app.js"></script>
</body>
</html>
